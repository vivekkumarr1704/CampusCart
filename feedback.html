<!DOCTYPE html>
<html>
<head>
<title>Feedback</title>
<link rel="stylesheet" href="css/style.css">

<style>

#popup{
position:fixed;
right:-400px;
top:30px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
width:320px;
transition:0.5s;
font-weight:500;
z-index:1000;
}

.showPopup{
right:20px;
}

</style>

</head>

<body>

<header>
<h1>CampusCart</h1>

<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="feedback.html">Feedback</a>
<a href="cart.html">Cart</a>
<a href="orders.html">Orders</a>
</nav>
</header>

<section style="display:flex;justify-content:center;padding:80px">

<div style="background:white;padding:40px;border-radius:15px;width:420px">

<h2 style="text-align:center;margin-bottom:20px">
Send Feedback
</h2>

<input id="name" type="text" placeholder="Your Name"
style="width:100%;padding:10px;margin-bottom:15px">

<input id="email" type="email" placeholder="Your Email"
style="width:100%;padding:10px;margin-bottom:15px">

<textarea id="feedbackText" placeholder="Write your feedback..."
style="width:100%;height:120px;padding:10px;margin-bottom:20px"></textarea>

<button onclick="submitFeedback()" style="width:100%">
Submit
</button>

</div>

</section>

<div id="popup"></div>

<footer>
<p style="text-align:center;color:white;padding:20px">
CampusCart © 2026 | Made for Students
</p>
</footer>

<script>

function submitFeedback(){

let name=document.getElementById("name").value
let email=document.getElementById("email").value
let feedback=document.getElementById("feedbackText").value

if(name=="" || email=="" || feedback==""){
alert("Please fill all fields")
return
}

let popup=document.getElementById("popup")

popup.innerHTML = `<b>${name}</b> (${email}) : ${feedback}`

popup.classList.add("show")

setTimeout(function(){
popup.classList.remove("show")
},4000)

document.getElementById("name").value=""
document.getElementById("email").value=""
document.getElementById("feedbackText").value=""

}

</script>

</body>
</html>
